<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8" />
 <title>Battleship Checkpoint A</title>
 <style>
   body {
     font-family: Arial, sans-serif;
     max-width: 700px;
     margin: 40px auto;
     padding: 0 20px;
   }
   input, button {
     margin: 6px 0;
     padding: 8px;
     width: 100%;
     box-sizing: border-box;
   }
   .card {
     border: 1px solid #ccc;
     padding: 16px;
     margin-bottom: 20px;
     border-radius: 8px;
   }
   pre {
     background: #f4f4f4;
     padding: 10px;
     overflow-x: auto;
   }
 </style>
</head>
<body>
 <h1>Battleship - Checkpoint A</h1>

 <div class="card">
   <h2>Create Game</h2>
   <input type="number" id="gridSize" placeholder="Grid Size (5-20)" value="10" />
   <input type="number" id="maxPlayers" placeholder="Max Players (2-8)" value="2" />
   <button onclick="createGame()">Create Game</button>
 </div>

 <div class="card">
   <h2>Join Game</h2>
   <input type="text" id="joinGameId" placeholder="Game ID" />
   <input type="text" id="playerName" placeholder="Player Name" />
   <button onclick="joinGame()">Join Game</button>
 </div>

 <div class="card">
   <h2>View Game</h2>
   <input type="text" id="viewGameId" placeholder="Game ID" />
   <button onclick="viewGame()">Get Game</button>
 </div>

 <h2>Response</h2>
 <pre id="output">No response yet.</pre>

 <script>
   async function createGame() {
     const gridSize = parseInt(document.getElementById('gridSize').value, 10);
     const maxPlayers = parseInt(document.getElementById('maxPlayers').value, 10);

     const res = await fetch('/games', {
       method: 'POST',
       headers: { 'Content-Type': 'application/json' },
       body: JSON.stringify({ gridSize, maxPlayers })
     });

     const data = await res.json();
     document.getElementById('output').textContent = JSON.stringify(data, null, 2);

     if (data.gameId) {
       document.getElementById('joinGameId').value = data.gameId;
       document.getElementById('viewGameId').value = data.gameId;
     }
   }

   async function joinGame() {
     const gameId = document.getElementById('joinGameId').value.trim();
     const name = document.getElementById('playerName').value.trim();

     const res = await fetch(`/games/${gameId}/join`, {
       method: 'POST',
       headers: { 'Content-Type': 'application/json' },
       body: JSON.stringify({ name })
     });

     const data = await res.json();
     document.getElementById('output').textContent = JSON.stringify(data, null, 2);
   }

   async function viewGame() {
     const gameId = document.getElementById('viewGameId').value.trim();

     const res = await fetch(`/games/${gameId}`);
     const data = await res.json();

     document.getElementById('output').textContent = JSON.stringify(data, null, 2);
   }
 </script>
</body>
</html>
